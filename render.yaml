# Render deployment blueprint for the NeuroCare backend.
# Push the repo to GitHub and pick this file in the Render dashboard.

services:
  - type: web
    name: neurocare-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        # Set this in the Render dashboard to your Vercel URL(s), comma-separated.
        # Example: https://neurocare-final.vercel.app,https://neurocare-final-git-main-yourname.vercel.app
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: ""
      - key: PYTHON_VERSION
        value: 3.11.9
